# Database Configuration
# We use a default local URL, but Render will override this with the DATABASE_URL env var
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/linkdin}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Removed explicit PostgreSQLDialect as Hibernate 6 detects it automatically

# LinkedIn Configurations
linkedin.client.id=${LINKEDIN_CLIENT_ID}
linkedin.client.secret=${LINKEDIN_CLIENT_SECRET}
linkedin.redirect.uri=${LINKEDIN_REDIRECT_URI}

# Server Configuration
server.port=${PORT:8080}
