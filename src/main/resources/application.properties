# Database Configuration - PostgreSQL (Neon)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/linkdin}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# LinkedIn Configurations
linkedin.client.id=${LINKEDIN_CLIENT_ID:your-client-id}
linkedin.client.secret=${LINKEDIN_CLIENT_SECRET:your-client-secret}
linkedin.redirect.uri=${LINKEDIN_REDIRECT_URI:http://localhost:3000/auth/linkedin/callback}

server.port=${PORT:8080}
